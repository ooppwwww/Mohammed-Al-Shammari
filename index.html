<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان محمد السليطي الشمري</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --primary-color: #5d4037;
            --accent-color: #8d6e63;
            --text-color: #3e2723;
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 30px auto; padding: 20px; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Amiri', serif; font-size: 50px; color: var(--primary-color); margin: 0; }

        /* القائمة (الخيارات) */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0dcd0;
            padding-bottom: 10px;
        }

        .nav-tabs button {
            background: none;
            border: none;
            padding: 10px 30px;
            font-size: 19px;
            font-family: 'Almarai', sans-serif;
            cursor: pointer;
            color: #9e9185;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-tabs button.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        /* المحتوى */
        .tab-content { display: none; animation: fadeIn 0.6s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            padding: 45px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #e0dcd0;
        }

        /* السيرة الذاتية */
        .bio-title {
            font-family: 'Amiri', serif;
            font-size: 32px;
            color: var(--primary-color);
            margin-top: 0;
            border-right: 5px solid var(--accent-color);
            padding-right: 15px;
        }
        .bio-text { font-size: 21px; text-align: justify; color: #4a3728; }
        .quote {
            font-style: italic;
            background: #fdfaf5;
            padding: 20px;
            border-left: 4px solid var(--accent-color);
            margin: 25px 0;
            color: var(--primary-color);
            font-family: 'Amiri', serif;
            font-size: 24px;
        }

        /* القصائد */
        .poem-title { font-family: 'Amiri', serif; font-size: 34px; text-align: center; color: var(--primary-color); margin-top: 20px; }
        .verse { display: flex; justify-content: space-between; margin-bottom: 15px; font-family: 'Amiri', serif; font-size: 26px; }
        .sadr { width: 46%; text-align: right; }
        .ajuz { width: 46%; text-align: left; color: #5d5d5d; }

        /* التواصل الاجتماعي */
        .social-container { text-align: center; }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 18px 45px;
            border-radius: 5px;
            margin: 10px;
            font-size: 20px;
            transition: 0.3s;
            min-width: 280px;
        }
        .btn-x { background-color: #000000; }
        .btn-insta { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); }
        .social-btn i { margin-left: 12px; font-size: 24px; }
        .social-btn:hover { opacity: 0.85; transform: translateY(-3px); }

            .verse { flex-direction: column; text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
