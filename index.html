<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان محمد السليطي الشمري</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --primary-color: #5d4037;
            --accent-color: #8d6e63;
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg-color);
            color: #3e2723;
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 20px auto; padding: 15px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Amiri', serif; font-size: 45px; color: var(--primary-color); margin: 0; }

        /* أزرار التنقل */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0dcd0;
            padding-bottom: 5px;
        }

        .nav-tabs button {
            background: none;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            color: #9e9185;
            font-weight: bold;
            font-family: 'Almarai', sans-serif;
        }

        .nav-tabs button.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        /* المحتوى */
        .tab-content { display: none; }
        .active-content { display: block !important; }
