<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان محمد السليطي الشمري</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --primary-color: #5d4037;
            --accent-color: #8d6e63;
            --text-color: #3e2723;
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 20px auto; padding: 15px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Amiri', serif; font-size: clamp(35px, 8vw, 50px); color: var(--primary-color); margin: 0; }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0dcd0;
            padding-bottom: 5px;
            flex-wrap: wrap;
        }

        .nav-tabs button {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 17px;
            font-family: 'Almarai', sans-serif;
            cursor: pointer;
            color: #9e9185;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-tabs button.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        .tab-content { 
            display: none; 
            animation: fadeIn 0.4s ease-in;
        }
        
        #bio { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card-bg);
            padding: clamp(20px, 5vw, 45px);
            border-radius: 4px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border: 1px solid #e0dcd0;
        }

        .bio-title {
            font-family: 'Amiri', serif;
            font-size: 30px;
            color: var(--primary-color);
            margin-top: 0;
            border-right: 5px solid var(--accent-color);
            padding-right: 15px;
        }
        .bio-text { font-size: 20px; text-align: justify; color: #4a3728; }
        
        .quote {
            font-style: italic;
            background: #fdfaf5;
            padding: 15px;
            border-left: 4px solid var(--accent-color);
            margin: 20px 0;
            color: var(--primary-color);
            font-family: 'Amiri', serif;
            font-size: 22px;
        }

        .poem-section { margin-bottom: 50px; border-bottom: 1px dashed #e0dcd0; padding-bottom: 30px; }
