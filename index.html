<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان محمد السليطي - قصيدة ريوف</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Amiri', serif;
            background-color: #f9f7f2; /* لون ورقي كلاسيكي */
            color: #2c2c2c;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 750px;
            margin: 40px auto;
            background: #ffffff;
            padding: 50px 30px;
            border: 1px solid #e0dcd0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .header-site {
            border-bottom: 2px solid #8b0000; /* خط عنابي فخم */
            margin-bottom: 40px;
            padding-bottom: 15px;
            text-align: center;
        }
        .poem-title {
            color: #8b0000;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .poet-name {
            font-size: 20px;
            color: #555;
            margin-bottom: 40px;
            text-align: center;
            font-style: italic;
        }
        .poem-body {
            line-height: 2.5;
            font-size: 24px;
            margin-top: 20px;
        }
        .verse {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 10px;
        }
        .sadr {
            width: 47%;
            text-align: right;
            padding-left: 10px;
        }
        .ajuz {
            width: 47%;
            text-align: left;
            padding-right: 10px;
        }
        /* تنسيق الجوال */
        @media (max-width: 650px) {
            .verse {
                flex-direction: column;
                text-align: center;
                margin-bottom: 25px;
            }
            .sadr, .ajuz {
                width: 100%;
                padding: 0;
            }
            .ajuz {
                color: #666;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-site">
        <div style="font-size: 18px; letter-spacing: 2px; color: #8b0000; font-weight: bold;">ديوان العرب</div>
    </div>

    <div class="poem-title">ريوف</div>
    <div class="poet-name">الشاعر: محمد السليطي الشمري</div>

    <div class="poem-body">
        <div class="verse">
            <div class="sadr">يا هيه ياللي خذيتي من الحلا ما كفاك</div>
            <div class="ajuz">يا رزانةٍ ترجح بكل العقول وتجيرها</div>
        </div>

        <div class="verse">
            <div class="sadr">ما هو مدحٍ رخيصٍ ينقال في ذا وذاك</div>
            <div class="ajuz">إلا فخرٍ بـ روحٍ ما لقيت مثيلها</div>
        </div>
